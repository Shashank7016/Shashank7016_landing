<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="48" fill="#0f172a" rx="12"/>
  <rect x="0" y="12" width="800" height="36" fill="#0f172a"/>
  <circle cx="24" cy="24" r="6" fill="#ef4444" opacity="0.8"/>
  <circle cx="44" cy="24" r="6" fill="#eab308" opacity="0.8"/>
  <circle cx="64" cy="24" r="6" fill="#22c55e" opacity="0.8"/>
  <text x="400" y="29" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="600">AI Bill Splitter</text>

  <!-- Receipt card (left) -->
  <rect x="40" y="72" width="280" height="390" fill="#1e293b" rx="16" stroke="#334155" stroke-width="1"/>
  <text x="180" y="104" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="14" font-weight="600">Receipt Scan</text>

  <!-- Camera/photo area -->
  <rect x="60" y="120" width="240" height="160" fill="#0f172a" rx="12" stroke="#334155" stroke-width="1" stroke-dasharray="6 4"/>
  <circle cx="180" cy="185" r="28" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <circle cx="180" cy="185" r="12" fill="#3b82f6" opacity="0.3"/>
  <text x="180" y="230" text-anchor="middle" fill="#64748b" font-family="system-ui" font-size="11">Snap or upload receipt</text>

  <!-- Extracted items -->
  <rect x="60" y="296" width="240" height="32" fill="#0f172a" rx="8"/>
  <text x="76" y="317" fill="#94a3b8" font-family="system-ui" font-size="11">Pasta Carbonara</text>
  <text x="280" y="317" text-anchor="end" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">$18.50</text>

  <rect x="60" y="336" width="240" height="32" fill="#0f172a" rx="8"/>
  <text x="76" y="357" fill="#94a3b8" font-family="system-ui" font-size="11">Caesar Salad</text>
  <text x="280" y="357" text-anchor="end" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">$12.00</text>

  <rect x="60" y="376" width="240" height="32" fill="#0f172a" rx="8"/>
  <text x="76" y="397" fill="#94a3b8" font-family="system-ui" font-size="11">Iced Coffee x2</text>
  <text x="280" y="397" text-anchor="end" fill="#3b82f6" font-family="system-ui" font-size="11" font-weight="600">$9.00</text>

  <rect x="60" y="420" width="240" height="28" fill="none" rx="8"/>
  <text x="76" y="439" fill="#64748b" font-family="system-ui" font-size="11">Total</text>
  <text x="280" y="439" text-anchor="end" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="700">$39.50</text>

  <!-- Split panel (right) -->
  <rect x="348" y="72" width="420" height="390" fill="#1e293b" rx="16" stroke="#334155" stroke-width="1"/>
  <text x="558" y="104" text-anchor="middle" fill="#e2e8f0" font-family="system-ui" font-size="14" font-weight="600">Split Among</text>

  <!-- User avatars row -->
  <circle cx="420" cy="148" r="24" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="2"/>
  <text x="420" y="153" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="12" font-weight="600">SC</text>
  <text x="420" y="186" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">You</text>

  <circle cx="500" cy="148" r="24" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="2"/>
  <text x="500" y="153" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="12" font-weight="600">AK</text>
  <text x="500" y="186" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Alex</text>

  <circle cx="580" cy="148" r="24" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="2"/>
  <text x="580" y="153" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="12" font-weight="600">MJ</text>
  <text x="580" y="186" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">Maya</text>

  <circle cx="660" cy="148" r="24" fill="#0f172a" stroke="#475569" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="660" y="154" text-anchor="middle" fill="#475569" font-family="system-ui" font-size="18">+</text>

  <!-- Split breakdown -->
  <rect x="376" y="210" width="364" height="60" fill="#0f172a" rx="12"/>
  <circle cx="404" cy="240" r="14" fill="#3b82f6" opacity="0.2"/>
  <text x="404" y="244" text-anchor="middle" fill="#3b82f6" font-family="system-ui" font-size="9" font-weight="600">SC</text>
  <text x="428" y="234" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="500">Shashank</text>
  <text x="428" y="252" fill="#64748b" font-family="system-ui" font-size="10">Pasta Carbonara, Iced Coffee</text>
  <text x="720" y="244" text-anchor="end" fill="#3b82f6" font-family="system-ui" font-size="13" font-weight="700">$23.00</text>

  <rect x="376" y="280" width="364" height="60" fill="#0f172a" rx="12"/>
  <circle cx="404" cy="310" r="14" fill="#8b5cf6" opacity="0.2"/>
  <text x="404" y="314" text-anchor="middle" fill="#8b5cf6" font-family="system-ui" font-size="9" font-weight="600">AK</text>
  <text x="428" y="304" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="500">Alex</text>
  <text x="428" y="322" fill="#64748b" font-family="system-ui" font-size="10">Caesar Salad</text>
  <text x="720" y="314" text-anchor="end" fill="#8b5cf6" font-family="system-ui" font-size="13" font-weight="700">$12.00</text>

  <rect x="376" y="350" width="364" height="60" fill="#0f172a" rx="12"/>
  <circle cx="404" cy="380" r="14" fill="#22c55e" opacity="0.2"/>
  <text x="404" y="384" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="9" font-weight="600">MJ</text>
  <text x="428" y="374" fill="#e2e8f0" font-family="system-ui" font-size="12" font-weight="500">Maya</text>
  <text x="428" y="392" fill="#64748b" font-family="system-ui" font-size="10">Iced Coffee</text>
  <text x="720" y="384" text-anchor="end" fill="#22c55e" font-family="system-ui" font-size="13" font-weight="700">$4.50</text>

  <!-- AI badge -->
  <rect x="376" y="424" width="364" height="36" fill="url(#accent)" rx="10" opacity="0.15"/>
  <text x="558" y="447" text-anchor="middle" fill="#93c5fd" font-family="system-ui" font-size="12" font-weight="600">AI Auto-Split Ready</text>
</svg>
